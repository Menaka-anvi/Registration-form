<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container m-4">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <form action="" method="get">
                    <fieldset>
                        <legend>
                            Enroll your Details
                        </legend>

                        <br>
                        <label for="" class="form-label" >Name</label>
                        <br>
                        <input type="text" class="form-control mt-3" placeholder="Enter Your Name" required>
                        <br>
                        <label for="" class="form-label" >Age</label>
                        <br>
                        <input type="Number" class="form-control mt-3" placeholder="Enter Your Age" required>
                        <br>
                        <label for="" class="form-label" >Email</label>
                        <br>
                        <input type="email" class="form-control mt-3" placeholder="Enter Your Email" required>
                        <br>
                        <label for="" class="form-label" >Phone number</label>
                        <br>
                        <input type="Number" class="form-control mt-3" placeholder="Enter Your Phone number" required>
                        <br>
                        <br>
                        <select name="Gender" id="">
                            <option value="Select">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Others">Others</option>
                        </select>
                        <br>
                        <br>

                        <br>
                        <legend>I agree your terms and conditions</legend>
                        <input type="checkbox" class="form-checkbox mt-3" name="" id="">

                        <br>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </fieldset>

                </form>




























            </div>
            <div class="col-md-3"></div>
        </div>
    </div>



































    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
