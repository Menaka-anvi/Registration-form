<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Mini-Project-6 Registeration Form Using function prototype | class
        and object of es6</title>
    <title>Registration form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .search-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-container input {
            width: 200px;
        }
        .search-container button {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./static/logo1.jpeg" alt="Logo" height="40" class="d-inline-block align-text-top">
                Registration Form
            </a>
        </div>
    </nav>

    <div class="container m-4">
        <div class="row">
            <div class="col-md-5">
                <h5 class="text-center bg-white text-dark p-2">Register Your Details</h5>

                <form id="registrationForm">
                    <div class="form-group">
                        <!-- <label for="name">Name</label> -->
                        <input type="text" class="form-control mb-3" name="name" id="name"
                            placeholder="Enter Your Name">
                    </div>

                    <div class="form-group">
                        <input type="text" class="form-control mb-3" name="email" id="email"
                            placeholder="Enter Your Email">
                    </div>

                    <div class="form-group mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Enter Your Password">
                        <small class="text-muted">At least 8 characters, with uppercase, lowercase, number, and special
                            character.</small>
                        <div class="invalid-feedback">Password does not meet requirements.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Submit</button>
                    </div>
                </form>
            </div>
            <div class="col-md-7">
                <div id="showmessage"></div>
                <h5 class="text-center bg-white text-dark p-2">View Details</h5>

                <div class="search-container">
                    <input class="form-control" id="searchInput" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit" form="searchForm">Search</button>
                </div>
                <form id="searchForm"></form>

                <table class="table table-success">
                    <thead>
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Email</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
